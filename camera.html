<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camera Capture</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: white;
  }
  h2 { margin-bottom: 15px; font-size: 20px; }
  .info { font-size: 12px; opacity: 0.85; margin-bottom: 15px; text-align: center; }
  #video, #preview {
    width: 100%;
    max-width: 420px;
    border-radius: 12px;
    background: black;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  #video.square, #preview.square {
    aspect-ratio: 1 / 1;
    object-fit: cover;
  }
  .btn-row {
    margin-top: 18px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    padding: 12px 22px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 12px rgba(0,0,0,.2);
  }
  button:hover { transform: translateY(-2px); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-capture { background: #667eea; color: white; }
  .btn-retake  { background: #ff9800; color: white; }
  .btn-use     { background: #28a745; color: white; }
  .btn-cancel  { background: rgba(255,255,255,0.2); color: white; }
  .error {
    background: rgba(255,255,255,0.95);
    color: #d32f2f;
    padding: 14px 20px;
    border-radius: 8px;
    margin-top: 15px;
    font-size: 14px;
    max-width: 420px;
    text-align: center;
  }
</style>
</head>
<body>

<h2 id="title">📷 Camera</h2>
<div class="info" id="info"></div>

<video id="video" autoplay playsinline></video>
<img id="preview" style="display:none;" alt="Captured">
<canvas id="canvas" style="display:none;"></canvas>

<div class="btn-row" id="liveButtons">
  <button class="btn-capture" id="captureBtn" disabled>📸 Capture</button>
  <button class="btn-cancel"  id="cancelBtn">Cancel</button>
</div>

<div class="btn-row" id="previewButtons" style="display:none;">
  <button class="btn-retake" id="retakeBtn">🔄 Retake</button>
  <button class="btn-use"    id="useBtn">✅ Use This Photo</button>
  <button class="btn-cancel" id="cancelBtn2">Cancel</button>
</div>

<div id="errorBox" class="error" style="display:none;"></div>

<script>
  // ===== Parse URL params =====
  var params = new URLSearchParams(window.location.search);
  var type   = (params.get('type') || 'patient').toLowerCase(); // 'patient' or 'lab'
  var origin = params.get('origin') || '*'; // optional: caller's origin to lock postMessage to

  // ===== Configure per type =====
  var config = {
    patient: {
      title:    '📷 Capture Patient Photo',
      info:     'Square 300×300 JPEG • Front camera',
      square:   true,
      width:    300,
      height:   300,
      quality:  0.7,
      facingMode: 'user'
    },
    lab: {
      title:    '🧪 Capture Lab Slip',
      info:     'Full-frame JPEG • Rear camera (on mobile)',
      square:   false,
      width:    null,    // use native video size
      height:   null,
      quality:  0.7,
      facingMode: 'environment'
    }
  };
  var cfg = config[type] || config.patient;

  document.getElementById('title').textContent = cfg.title;
  document.getElementById('info').textContent  = cfg.info;

  var video    = document.getElementById('video');
  var canvas   = document.getElementById('canvas');
  var preview  = document.getElementById('preview');
  if (cfg.square) {
    video.classList.add('square');
    preview.classList.add('square');
  }

  var captureBtn = document.getElementById('captureBtn');
  var retakeBtn  = document.getElementById('retakeBtn');
  var useBtn     = document.getElementById('useBtn');
  var cancelBtn  = document.getElementById('cancelBtn');
  var cancelBtn2 = document.getElementById('cancelBtn2');
  var errorBox   = document.getElementById('errorBox');
  var liveBtns   = document.getElementById('liveButtons');
  var previewBtns= document.getElementById('previewButtons');

  var stream = null;
  var capturedBase64 = null;

  // ===== Start camera =====
  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: cfg.facingMode },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      captureBtn.disabled = false;
    } catch (err) {
      showError("Camera error: " + err.message + "\n\nPlease allow camera access and reload.");
    }
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(function(t) { t.stop(); });
      stream = null;
    }
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
    captureBtn.disabled = true;
  }

  // ===== Capture =====
  captureBtn.addEventListener('click', function() {
    var w = cfg.width  || video.videoWidth;
    var h = cfg.height || video.videoHeight;

    canvas.width  = w;
    canvas.height = h;
    var ctx = canvas.getContext('2d');

    if (cfg.square) {
      // crop center square then scale to 300x300
      var srcSize = Math.min(video.videoWidth, video.videoHeight);
      var sx = (video.videoWidth  - srcSize) / 2;
      var sy = (video.videoHeight - srcSize) / 2;
      ctx.drawImage(video, sx, sy, srcSize, srcSize, 0, 0, w, h);
    } else {
      ctx.drawImage(video, 0, 0, w, h);
    }

    capturedBase64 = canvas.toDataURL('image/jpeg', cfg.quality);

    preview.src = capturedBase64;
    video.style.display   = 'none';
    preview.style.display = 'block';
    liveBtns.style.display    = 'none';
    previewBtns.style.display = 'flex';

    stopCamera(); // stop tracks to save battery
  });

  // ===== Retake =====
  retakeBtn.addEventListener('click', async function() {
    capturedBase64 = null;
    preview.style.display = 'none';
    video.style.display   = 'block';
    previewBtns.style.display = 'none';
    liveBtns.style.display    = 'flex';
    captureBtn.disabled = true;
    await startCamera();
  });

  // ===== Use photo → postMessage back to opener =====
  useBtn.addEventListener('click', function() {
    if (!capturedBase64) return;
    if (!window.opener) {
      showError("Opener window not available. Please close and try again.");
      return;
    }
    try {
      window.opener.postMessage({
        source: 'rupa-camera',
        type:   type,
        photo:  capturedBase64
      }, origin);
    } catch (e) {
      showError("Failed to send photo: " + e.message);
      return;
    }
    window.close();
  });

  // ===== Cancel =====
  function doCancel() {
    stopCamera();
    if (window.opener) {
      try {
        window.opener.postMessage({
          source: 'rupa-camera',
          type:   type,
          cancelled: true
        }, origin);
      } catch (e) {}
    }
    window.close();
  }
  cancelBtn.addEventListener('click', doCancel);
  cancelBtn2.addEventListener('click', doCancel);
  window.addEventListener('beforeunload', stopCamera);

  // ===== Go =====
  startCamera();
</script>

</body>
</html>
